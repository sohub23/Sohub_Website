[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept"

[[headers]]
  for = "/brochures/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
